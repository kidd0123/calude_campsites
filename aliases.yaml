# Hand-curated map of multi-word aliases → facility name fragment.
# Lets the Reddit matcher recognize popular shorthand like "Big Basin" or "Pinnacles east".
# Match is case-insensitive, alias substring → if found in text AND facility name contains
# the value, count as a match.

